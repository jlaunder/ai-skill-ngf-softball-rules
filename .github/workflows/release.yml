name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p ngf-softball-rules
          cp SKILL.md ngf-softball-rules/
          cp -r references ngf-softball-rules/
          zip -r ngf-softball-rules-skill.zip ngf-softball-rules/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ngf-softball-rules-skill.zip
